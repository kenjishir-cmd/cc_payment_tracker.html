<!DOCTYPE html>
<html lang="zh-TW">
<head>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>信用卡繳款管理 v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0c10;color:#e2e8f0;font-family:'Noto Sans TC',sans-serif;min-height:100vh}
.card{background:#111318;border:1px solid #1e2330;border-radius:12px;margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:#0e1117;border:1px solid #1e2330;border-radius:10px;padding:14px}
.wave-btn{border:1px solid #1e2330;background:#111318;color:#64748b;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:inherit}
.wave-btn.active{background:#1e293b;border-color:#3b82f6;color:#60a5fa}
.row{border-bottom:1px solid #1a1f2e;padding:11px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.row:last-child{border-bottom:none}
.avatar{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}
.manual{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.auto{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2)}
.w1{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.2);border-radius:6px}
.w2{background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.2);border-radius:6px}
.w3{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2);border-radius:6px}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.notif-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500}
.notif-on{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25)}
.notif-off{background:rgba(100,116,139,.08);color:#64748b;border:1px solid #1e2330}
.banner{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:#052e16;border:1px solid rgba(52,211,153,.3);color:#34d399;padding:9px 16px;border-radius:10px;font-size:12px;z-index:999;white-space:nowrap;animation:slideDown .3s ease}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.cbtn{border:1px solid #334155;background:none;color:#64748b;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:11px;font-family:inherit;margin-top:4px}
.cbtn.done{background:rgba(52,211,153,.1);color:#34d399;border-color:rgba(52,211,153,.3)}
.version-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);color:#818cf8;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:600;letter-spacing:.5px;cursor:pointer;position:relative}
.version-badge:hover .version-tooltip{display:block}
.version-tooltip{display:none;position:absolute;top:calc(100% + 8px);right:0;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 14px;min-width:220px;z-index:200;white-space:normal;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.version-tooltip::before{content:'';position:absolute;top:-5px;right:12px;width:8px;height:8px;background:#1e293b;border-left:1px solid #334155;border-top:1px solid #334155;transform:rotate(45deg)}
.notif-panel{background:#0e1117;border:1px solid #1e2330;border-radius:12px;margin-bottom:14px;overflow:hidden}
.notif-panel-header{padding:12px 14px;border-bottom:1px solid #1a1f2e;display:flex;align-items:center;justify-content:space-between}
.notif-item{padding:10px 14px;border-bottom:1px solid #1a1f2e;display:flex;align-items:center;gap:10px;transition:background .15s}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:rgba(255,255,255,.02)}
.notif-item.urgent{background:rgba(239,68,68,.04)}
.notif-item.today{background:rgba(251,191,36,.04)}
.notif-item.soon{background:rgba(96,165,250,.03)}
.notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.notif-dot.red{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,.5)}
.notif-dot.yellow{background:#fbbf24;box-shadow:0 0 6px rgba(251,191,36,.5)}
.notif-dot.blue{background:#3b82f6;box-shadow:0 0 6px rgba(59,130,246,.4)}
.notif-dot.green{background:#34d399;box-shadow:0 0 6px rgba(52,211,153,.3)}
.dismiss-btn{background:none;border:1px solid #1e2330;color:#475569;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:10px;font-family:inherit;flex-shrink:0}
.dismiss-btn:hover{border-color:#334155;color:#64748b}
.notif-empty{padding:20px 14px;text-align:center;color:#334155;font-size:12px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const VERSION = {
  num: "2.0.0",
  date: "2025-04-29",
  changes: [
    "✦ 新增版本識別標記",
    "✦ 頁面內提醒面板（即時預警）",
    "✦ 瀏覽器通知強化（今天/1天/3天）",
    "✦ 提醒可個別關閉",
  ]
};

const BANKS=[
  {id:1,name:"遠東商銀",day:2,type:"manual",wave:1},
  {id:2,name:"國泰世華",day:3,type:"auto",wave:1},
  {id:3,name:"華南銀行",day:7,type:"auto",wave:1},
  {id:4,name:"玉山銀行",day:7,type:"auto",wave:1},
  {id:5,name:"聯邦銀行",day:9,type:"manual",wave:2},
  {id:6,name:"元大銀行",day:10,type:"manual",wave:2},
  {id:7,name:"台新銀行",day:12,type:"auto",wave:2},
  {id:8,name:"新光銀行",day:14,type:"auto",wave:2},
  {id:9,name:"中國信託",day:20,type:"auto",wave:3},
  {id:10,name:"兆豐銀行",day:21,type:"manual",wave:3},
  {id:11,name:"彰化銀行",day:31,type:"manual",wave:3},
  {id:12,name:"台北富邦",day:null,type:"manual",wave:null}
];
const WAVES=[
  {id:1,label:"第一波",checkDay:18,banks:[1,2,3,4],color:"#60a5fa",next:false},
  {id:2,label:"第二波",checkDay:25,banks:[5,6,7,8],color:"#a78bfa",next:false},
  {id:3,label:"第三波",checkDay:4,banks:[9,10,11],color:"#34d399",next:true}
];

function getDue(d){
  if(!d)return null;
  const t=new Date(),r=d+18;
  return r<=31?new Date(t.getFullYear(),t.getMonth(),r):new Date(t.getFullYear(),t.getMonth()+1,r-30);
}
function getWD(w){
  const t=new Date();t.setHours(0,0,0,0);
  if(w.next)return new Date(t.getFullYear(),t.getMonth()+1,w.checkDay);
  const c=new Date(t.getFullYear(),t.getMonth(),w.checkDay);
  return c<t?new Date(t.getFullYear(),t.getMonth()+1,w.checkDay):c;
}
function daysTo(d){const t=new Date();t.setHours(0,0,0,0);return Math.ceil((d-t)/86400000);}
function fmt(d){return d?d.getMonth()+1+"/"+d.getDate():"—";}
function curWave(){const d=new Date().getDate();return d<=18?1:d<=25?2:3;}
function monthKey(){const t=new Date();return t.getFullYear()+"-"+(t.getMonth()+1);}

let fw="all";
let remOn=localStorage.getItem("rem")==="1";
let banner="",bTimer=null;
let confirmed=JSON.parse(localStorage.getItem("confirmed")||"{}");
let dismissedNotifs=JSON.parse(localStorage.getItem("dismissedNotifs")||"{}");
const today=new Date();
const cw=curWave();

function getPageAlerts(){
  const alerts=[];
  WAVES.forEach(w=>{
    const cd=getWD(w);
    const days=daysTo(cd);
    const manualBanks=w.banks.map(id=>BANKS.find(b=>b.id===id)).filter(b=>b&&b.type==="manual");
    const unconfirmed=manualBanks.filter(b=>!isDone(b.id));
    if(days===0){
      alerts.push({id:"wave-check-"+w.id,level:"today",icon:"📋",title:w.label+"檢查日到了！",body:"今天（"+fmt(cd)+"）請確認各卡繳款狀態",wave:w.id});
    } else if(days===1){
      alerts.push({id:"wave-check-soon-"+w.id,level:"urgent",icon:"⚡",title:w.label+"明天要對帳！",body:"明天（"+fmt(cd)+"）是"+w.label+"對帳日，請提前確認",wave:w.id});
    } else if(days<=3&&days>1){
      alerts.push({id:"wave-check-3-"+w.id,level:"soon",icon:"🔔",title:w.label+"即將對帳",body:days+"天後（"+fmt(cd)+"）是"+w.label+"對帳日",wave:w.id});
    }
    unconfirmed.forEach(b=>{
      const due=getDue(b.day);
      if(!due)return;
      const dd=daysTo(due);
      if(dd<=3&&dd>=0){
        const level=dd===0?"urgent":dd===1?"today":"soon";
        alerts.push({id:"bank-due-"+b.id,level,icon:dd===0?"🚨":dd===1?"⚠️":"💳",title:b.name+(dd===0?" 今日截止！":dd===1?" 明日截止！":" 即將截止"),body:"截止日："+fmt(due)+"（"+w.label+"・手動繳款）",wave:w.id});
      }
    });
  });
  return alerts.filter(a=>!isDismissed(a.id));
}

function isDismissed(id){
  const k=monthKey();
  return !!(dismissedNotifs[k]&&dismissedNotifs[k][id]);
}
function dismissAlert(id){
  const k=monthKey();
  if(!dismissedNotifs[k])dismissedNotifs[k]={};
  dismissedNotifs[k][id]=true;
  localStorage.setItem("dismissedNotifs",JSON.stringify(dismissedNotifs));
  render();
}

function doNotify(){
  if(localStorage.getItem("rem")!=="1"||Notification.permission!=="granted")return;
  WAVES.forEach(w=>{
    const days=daysTo(getWD(w));
    if(![0,1,3].includes(days))return;
    const manualNames=w.banks.map(id=>BANKS.find(b=>b.id===id)).filter(b=>b&&b.type==="manual").map(b=>b.name);
    const title=days===0?"💳 今天是"+w.label+"檢查日！":"💳 "+w.label+"還有"+days+"天";
    const body=manualNames.length?"手動繳費："+manualNames.join("、"):"請確認各卡繳款狀態";
    new Notification(title,{body});
  });
  BANKS.forEach(b=>{
    if(b.type!=="manual")return;
    const due=getDue(b.day);
    if(!due)return;
    const dd=daysTo(due);
    if([0,1].includes(dd)&&!isDone(b.id)){
      new Notification(dd===0?"🚨 今日截止："+b.name:"⚠️ 明日截止："+b.name,{body:"截止日 "+fmt(due)+"，請盡快完成手動繳款"});
    }
  });
}
doNotify();
setInterval(doNotify,3600000);

function showBanner(msg){
  banner=msg;render();
  if(bTimer)clearTimeout(bTimer);
  bTimer=setTimeout(()=>{banner="";render();},3000);
}
function toggleConfirm(id){
  const k=monthKey();
  if(!confirmed[k])confirmed[k]={};
  if(confirmed[k][id])delete confirmed[k][id];
  else confirmed[k][id]=true;
  localStorage.setItem("confirmed",JSON.stringify(confirmed));
  render();
}
function isDone(id){const k=monthKey();return !!(confirmed[k]&&confirmed[k][id]);}
function resetAll(){
  const k=monthKey();
  delete confirmed[k];
  localStorage.setItem("confirmed",JSON.stringify(confirmed));
  render();
}
async function toggleNotif(){
  if(!remOn){
    const p=await Notification.requestPermission();
    if(p==="granted"){localStorage.setItem("rem","1");remOn=true;showBanner("✓ 瀏覽器通知已開啟！");doNotify();}
    else showBanner("⚠ 請在瀏覽器設定允許通知");
  } else {
    localStorage.setItem("rem","0");remOn=false;showBanner("通知已關閉");render();
  }
}
function setFw(v){fw=v;render();}

function render(){
  const nextW=WAVES.map(w=>({...w,cd:getWD(w),dl:daysTo(getWD(w))})).filter(w=>w.dl>=0).sort((a,b)=>a.dl-b.dl)[0];
  const banks=fw==="all"?BANKS:BANKS.filter(b=>String(b.wave)===fw);
  const manual=BANKS.filter(b=>b.type==="manual");
  const doneCount=BANKS.filter(b=>isDone(b.id)).length;
  const ds=today.getFullYear()+"/"+(today.getMonth()+1).toString().padStart(2,"0")+"/"+today.getDate().toString().padStart(2,"0");
  const alerts=getPageAlerts();

  const versionTooltipHtml=`
    <div class="version-tooltip">
      <div style="font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:4px">v${VERSION.num}</div>
      <div style="font-size:10px;color:#475569;margin-bottom:8px">更新日期：${VERSION.date}</div>
      <div style="height:1px;background:#1e2330;margin-bottom:8px"></div>
      ${VERSION.changes.map(c=>`<div style="font-size:11px;color:#64748b;line-height:1.8">${c}</div>`).join("")}
    </div>`;

  let alertsHtml="";
  if(alerts.length>0){
    const levelColor={urgent:"#ef4444",today:"#fbbf24",soon:"#3b82f6"};
    const dotClass={urgent:"red",today:"yellow",soon:"blue"};
    alertsHtml=`<div class="notif-panel">
      <div class="notif-panel-header">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="pulse" style="width:7px;height:7px;border-radius:50%;background:#ef4444;display:inline-block"></span>
          <span style="font-size:11px;color:#94a3b8;font-weight:600">ALERTS · ${alerts.length} 則提醒</span>
        </div>
        <button onclick="dismissAllAlerts()" style="background:none;border:1px solid #1e2330;color:#475569;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:10px;font-family:inherit">全部關閉</button>
      </div>
      ${alerts.map(a=>`
        <div class="notif-item ${a.level}">
          <span class="notif-dot ${dotClass[a.level]}"></span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:${levelColor[a.level]}">${a.icon} ${a.title}</div>
            <div style="font-size:11px;color:#475569;margin-top:2px">${a.body}</div>
          </div>
          <button class="dismiss-btn" onclick="dismissAlert('${a.id}')">忽略</button>
        </div>`).join("")}
    </div>`;
  } else {
    alertsHtml=`<div class="notif-panel">
      <div class="notif-panel-header">
        <span style="font-size:11px;color:#334155">ALERTS · 目前無待辦提醒</span>
        <span style="font-size:18px">✅</span>
      </div>
      <div class="notif-empty">所有波段皆在安全範圍內</div>
    </div>`;
  }

  document.getElementById("app").innerHTML=
    (banner?`<div class='banner'>${banner}</div>`:"")
    +`<div style='border-bottom:1px solid #1e2330;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10'>
      <div style='display:flex;align-items:center;gap:10'>
        <div style='width:40px;height:40px;background:linear-gradient(135deg,#6366f1,#06b6d4);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0'>💳</div>
        <div>
          <div style='display:flex;align-items:center;gap:8px;flex-wrap:wrap'>
            <span style='font-size:18px;font-weight:700;color:#f1f5f9'>信用卡繳款管理</span>
            <span class='version-badge' onclick='this.querySelector(".version-tooltip").style.display=this.querySelector(".version-tooltip").style.display==="block"?"none":"block"'>
              v${VERSION.num} ${versionTooltipHtml}
            </span>
          </div>
          <div style='font-size:10px;color:#475569'>CREDIT CARD DASHBOARD</div>
        </div>
      </div>
      <div style='display:flex;align-items:center;gap:8px;flex-wrap:wrap'>
        <button class='notif-btn ${remOn?"notif-on":"notif-off"}' onclick='toggleNotif()'>${remOn?"🔔 通知開啟":"🔕 開啟通知"}</button>
        <div style='text-align:right'>
          <div style='font-size:9px;color:#475569'>TODAY</div>
          <div style='font-size:12px;color:#94a3b8'>${ds}</div>
        </div>
      </div>
    </div>`
    +`<div style='max-width:960px;margin:0 auto;padding:16px 12px'>`
    +alertsHtml
    +`<div class='stat-grid'>
      <div class='stat-card'><div style='font-size:9px;color:#475569;margin-bottom:6px'>總卡片數</div><div style='font-size:26px;font-weight:700;color:#f1f5f9'>${BANKS.length}</div><div style='font-size:10px;color:#64748b'>家銀行</div></div>
      <div class='stat-card'><div style='font-size:9px;color:#475569;margin-bottom:6px'>手動繳費</div><div style='font-size:26px;font-weight:700;color:#f87171'>${manual.length}</div><div style='font-size:10px;color:#64748b'>需要留意</div></div>
      <div class='stat-card'><div style='font-size:9px;color:#475569;margin-bottom:6px'>已確認</div><div style='font-size:26px;font-weight:700;color:#34d399'>${doneCount}</div><div style='font-size:10px;color:#64748b'>本月完成</div></div>
      ${nextW?`<div class='stat-card' style='border-color:rgba(59,130,246,.3)'><div style='font-size:9px;color:#475569;margin-bottom:6px'>下次檢查</div><div style='font-size:26px;font-weight:700;color:#60a5fa'>${nextW.dl===0?"今天":nextW.dl+"天"}</div><div style='font-size:10px;color:#64748b'>${nextW.label} · ${fmt(nextW.cd)}</div></div>`:""}
    </div>`
    +`<div class='card' style='padding:16px'>
      <div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8'>
        <span style='font-size:11px;color:#475569'>WAVE TRACKER · 檢查波段</span>
        <div style='display:flex;align-items:center;gap:6'>
          <span class='pulse' style='width:7px;height:7px;border-radius:50%;background:#3b82f6;display:inline-block'></span>
          <span style='font-size:11px;color:#64748b'>本月 ${today.getDate()} 號</span>
        </div>
      </div>
      <div style='position:relative'>
        <div style='display:flex;justify-content:space-between;margin-bottom:10px'>
          ${WAVES.map(wave=>{
            const cd=getWD(wave),days=daysTo(cd),isPast=days<0,isCur=wave.id===cw;
            return`<div style='flex:1;text-align:center'>
              <div style='width:34px;height:34px;border-radius:50%;margin:0 auto 7px;background:${isPast?"#1e2330":isCur?wave.color:"#1a2035"};border:2px solid ${isPast?"#1e2330":wave.color};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:${isPast?"#334155":isCur?"#0a0c10":wave.color};box-shadow:${isCur?"0 0 16px "+wave.color+"55":"none"}'>${wave.id}</div>
              <div style='font-size:12px;color:${isPast?"#334155":"#94a3b8"}'>${wave.label}</div>
              <div style='font-size:10px;color:#475569;margin-top:2px'>${wave.next?"次月":""}${wave.checkDay}號</div>
              <div style='font-size:11px;margin-top:3px;color:${isPast?"#334155":days===0?"#fbbf24":wave.color}'>${isPast?"已過":days===0?"今天！":days+"天後"}</div>
            </div>`;
          }).join("")}
        </div>
        <div style='position:absolute;top:17px;left:16%;right:16%;height:2px;background:#1e2330;z-index:0'>
          <div style='height:100%;background:linear-gradient(90deg,#3b82f6,#a78bfa);width:${cw===1?"0%":cw===2?"50%":"100%"}'></div>
        </div>
      </div>
      <div style='height:1px;background:linear-gradient(90deg,transparent,#1e2330,transparent);margin:16px 0 12px'></div>
      <div style='display:flex;gap:8px;flex-wrap:wrap;align-items:center'>
        ${WAVES.map(wave=>`<div style='display:flex;align-items:center;gap:5px;flex-wrap:wrap'><span style='font-size:11px;color:#475569'>${wave.label}：</span>${wave.banks.map(bid=>{const b=BANKS.find(x=>x.id===bid);return`<span class='chip w${wave.id}'>${b?b.name:""}</span>`;}).join("")}</div>`).join("")}
      </div>
    </div>`
    +`<div class='card'>
      <div style='padding:12px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10;border-bottom:1px solid #1a1f2e'>
        <span style='font-size:11px;color:#475569'>BANK MONITOR · ${banks.length} 家</span>
        <div style='display:flex;gap:6px;flex-wrap:wrap'>
          ${["all","1","2","3"].map(w=>`<button class='wave-btn ${fw===w?"active":""}' onclick='setFw("${w}")'>${w==="all"?"全部":"第"+["一","二","三"][Number(w)-1]+"波"}</button>`).join("")}
          <button onclick='resetAll()' style='border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.08);color:#f87171;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:11px;font-family:inherit'>重置</button>
        </div>
      </div>
      ${banks.map(bank=>{
        const wave=WAVES.find(w=>w.id===bank.wave);
        const due=getDue(bank.day);
        const done=isDone(bank.id);
        return`<div class='row' style='opacity:${done?"0.5":"1"}'>
          <div class='avatar' style='background:${wave?wave.color+"18":"#1e2330"};border:1px solid ${wave?wave.color+"30":"#1e2330"};color:${wave?wave.color:"#475569"}'>${bank.name[0]}</div>
          <div style='flex:1;min-width:0'>
            <div style='font-size:14px;color:#cbd5e1;font-weight:500;text-decoration:${done?"line-through":"none"}'>${bank.name}</div>
            <div style='font-size:11px;color:#475569;margin-top:2px'>${bank.day!=null?"結帳 "+bank.day+" 號 → 截止 "+fmt(due):"結帳日未知"}</div>
          </div>
          <div style='display:flex;flex-direction:column;align-items:flex-end;gap:4px'>
            ${wave?`<span class='chip w${wave.id}' style='font-size:10px'>${wave.label}</span>`:""}
            <span class='chip ${bank.type==="manual"?"manual":"auto"}'>${bank.type==="manual"?"⚠ 手動":"✓ 自動"}</span>
            <button class='cbtn ${done?"done":""}' onclick='toggleConfirm(${bank.id})'>${done?"✓ 已確認":"確認繳款"}</button>
          </div>
        </div>`;
      }).join("")}
    </div>`
    +`<div style='padding:12px 14px;border-radius:10px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);display:flex;align-items:flex-start;gap:10'>
      <span style='font-size:14px;flex-shrink:0'>⚠️</span>
      <div>
        <div style='font-size:12px;color:#fca5a5;font-weight:600;margin-bottom:3px'>手動繳費提醒</div>
        <div style='font-size:12px;color:#ef4444;line-height:1.7'>${manual.map(b=>b.name).join("、")} 需手動繳款，請在截止日前完成。</div>
      </div>
    </div>`
    +`<div style='text-align:center;margin-top:18px;padding-bottom:14px;font-size:9px;color:#334155'>
        截止日 = 結帳日 + 18 天 &nbsp;·&nbsp; v${VERSION.num} &nbsp;·&nbsp; ${VERSION.date}
    </div>`
    +`</div>`;
}

function dismissAllAlerts(){
  const alerts=getPageAlerts();
  const k=monthKey();
  if(!dismissedNotifs[k])dismissedNotifs[k]={};
  alerts.forEach(a=>{dismissedNotifs[k][a.id]=true;});
  localStorage.setItem("dismissedNotifs",JSON.stringify(dismissedNotifs));
  render();
}

window.setFw=setFw;
window.toggleNotif=toggleNotif;
window.toggleConfirm=toggleConfirm;
window.resetAll=resetAll;
window.dismissAlert=dismissAlert;
window.dismissAllAlerts=dismissAllAlerts;

render();
</script>
</body>
</html>
