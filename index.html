<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>信用卡繳款管理</title><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0c10;color:#e2e8f0;font-family:'Noto Sans TC',sans-serif;min-height:100vh}.card{background:#111318;border:1px solid #1e2330;border-radius:12px;margin-bottom:14px}.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}.stat-card{background:#0e1117;border:1px solid #1e2330;border-radius:10px;padding:14px}.wave-btn{border:1px solid #1e2330;background:#111318;color:#64748b;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:inherit}.wave-btn.active{background:#1e293b;border-color:#3b82f6;color:#60a5fa}.row{border-bottom:1px solid #1a1f2e;padding:11px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}.row:last-child{border-bottom:none}.avatar{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}.manual{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}.auto{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2)}.w1{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.2);border-radius:6px}.w2{background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.2);border-radius:6px}.w3{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2);border-radius:6px}.pulse{animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.notif-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500}.notif-on{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25)}.notif-off{background:rgba(100,116,139,.08);color:#64748b;border:1px solid #1e2330}.banner{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:#052e16;border:1px solid rgba(52,211,153,.3);color:#34d399;padding:9px 16px;border-radius:10px;font-size:12px;z-index:999;white-space:nowrap}.cbtn{border:1px solid #334155;background:none;color:#64748b;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:11px;font-family:inherit;margin-top:4px}.cbtn.done{background:rgba(52,211,153,.1);color:#34d399;border-color:rgba(52,211,153,.3)}.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}.modal{background:#111318;border:1px solid #1e2330;border-radius:16px;padding:24px;width:100%;max-width:320px;text-align:center}.version-badge{display:inline-flex;align-items:center;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);color:#818cf8;border-radius:20px;padding:2px 10px;font-size:10px;font-weight:600;letter-spacing:.5px;cursor:pointer}.notif-panel{background:#0e1117;border:1px solid #1e2330;border-radius:12px;margin-bottom:14px;overflow:hidden}.notif-panel-header{padding:12px 14px;border-bottom:1px solid #1a1f2e;display:flex;align-items:center;justify-content:space-between}.notif-item{padding:10px 14px;border-bottom:1px solid #1a1f2e;display:flex;align-items:center;gap:10px}.notif-item:last-child{border-bottom:none}.notif-item.urgent{background:rgba(239,68,68,.04)}.notif-item.today{background:rgba(251,191,36,.04)}.notif-item.soon{background:rgba(96,165,250,.03)}.notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.notif-dot.red{background:#ef4444}.notif-dot.yellow{background:#fbbf24}.notif-dot.blue{background:#3b82f6}.dismiss-btn{background:none;border:1px solid #1e2330;color:#475569;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:10px;font-family:inherit;flex-shrink:0}</style></head><body><div id="app"></div><div id="modal-root"></div><script>const VERSIONS=[{num:"2.3.0",date:"2026-04-26",changes:["✦ 確認繳款顯示確認時間","✦ 保留確認/取消按鈕","✦ 點擊版本號顯示更新履歷"]},{num:"2.2.0",date:"2026-04-26",changes:["✦ 點擊版本號顯示完整更新履歷","✦ 確認繳款加入彈出確認/取消視窗","✦ 版次顯示於頁面底部"]},{num:"2.1.0",date:"2026-04-26",changes:["✦ 確認繳款加入彈出視窗","✦ 頁面內提醒面板","✦ 瀏覽器通知強化"]},{num:"2.0.0",date:"2026-04-25",changes:["✦ 新增版本識別標記","✦ 頁面內提醒面板","✦ 提醒可個別關閉"]},{num:"1.0.0",date:"2026-04-24",changes:["✦ 初始版本發布","✦ 12家銀行資料","✦ 波段追蹤","✦ 截止日計算"]}];const VERSION=VERSIONS[0];const BANKS=[{id:1,name:"遠東商銀",day:2,type:"manual",wave:1},{id:2,name:"國泰世華",day:3,type:"auto",wave:1},{id:3,name:"華南銀行",day:7,type:"auto",wave:1},{id:4,name:"玉山銀行",day:7,type:"auto",wave:1},{id:5,name:"聯邦銀行",day:9,type:"auto",wave:2},{id:6,name:"元大銀行",day:10,type:"manual",wave:2},{id:7,name:"台新銀行",day:12,type:"auto",wave:2},{id:8,name:"新光銀行",day:14,type:"auto",wave:2},{id:9,name:"中國信託",day:20,type:"auto",wave:3},{id:10,name:"兆豐銀行",day:21,type:"manual",wave:3},{id:11,name:"彰化銀行",day:31,type:"manual",wave:3},{id:12,name:"台北富邦",day:null,type:"manual",wave:null}];const WAVES=[{id:1,label:"第一波",checkDay:18,banks:[1,2,3,4],color:"#60a5fa",next:false},{id:2,label:"第二波",checkDay:25,banks:[5,6,7,8],color:"#a78bfa",next:false},{id:3,label:"第三波",checkDay:4,banks:[9,10,11],color:"#34d399",next:true}];function getDue(d){if(!d)return null;const t=new Date(),r=d+18;return r<=31?new Date(t.getFullYear(),t.getMonth(),r):new Date(t.getFullYear(),t.getMonth()+1,r-30);}function getWD(w){const t=new Date();t.setHours(0,0,0,0);if(w.next)return new Date(t.getFullYear(),t.getMonth()+1,w.checkDay);const c=new Date(t.getFullYear(),t.getMonth(),w.checkDay);return c<t?new Date(t.getFullYear(),t.getMonth()+1,w.checkDay):c;}function daysTo(d){const t=new Date();t.setHours(0,0,0,0);return Math.ceil((d-t)/86400000);}function fmt(d){return d?d.getMonth()+1+"/"+d.getDate():"—";}function fmtTime(ts){if(!ts)return"";const d=new Date(ts);return(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}function curWave(){const d=new Date().getDate();return d<=18?1:d<=25?2:3;}function monthKey(){const t=new Date();return t.getFullYear()+"-"+(t.getMonth()+1);}let fw="all",remOn=localStorage.getItem("rem")==="1",banner="",bTimer=null,confirmed=JSON.parse(localStorage.getItem("confirmed")||"{}"),dismissedNotifs=JSON.parse(localStorage.getItem("dismissedNotifs")||"{}");const today=new Date(),cw=curWave();function showBanner(msg){banner=msg;render();if(bTimer)clearTimeout(bTimer);bTimer=setTimeout(()=>{banner="";render();},3000);}function getConfirmed(id){const k=monthKey();return confirmed[k]&&confirmed[k][id]?confirmed[k][id]:null;}function isDone(id){return !!getConfirmed(id);}function showVersionHistory(){const mr=document.getElementById("modal-root");mr.innerHTML=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()" style="max-height:80vh;overflow-y:auto;text-align:left"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div style="font-size:16px;font-weight:700;color:#f1f5f9">📋 更新履歷</div><button onclick="closeModal()" style="background:none;border:1px solid #334155;color:#64748b;border-radius:8px;padding:4px 10px;cursor:pointer;font-family:inherit;font-size:12px">關閉</button></div>${VERSIONS.map((v,i)=>`<div style="margin-bottom:16px;padding-bottom:16px;border-bottom:${i<VERSIONS.length-1?"1px solid #1e2330":"none"}"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap"><span style="background:rgba(99,102,241,.15);color:#818cf8;border:1px solid rgba(99,102,241,.3);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700">v${v.num}</span>${i===0?"<span style='background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2);border-radius:20px;padding:2px 8px;font-size:10px'>最新</span>":""}<span style="font-size:11px;color:#475569">${v.date}</span></div>${v.changes.map(c=>`<div style="font-size:12px;color:#64748b;line-height:1.8;padding-left:4px">${c}</div>`).join("")}</div>`).join("")}</div></div>`;}function confirmPay(id){const bank=BANKS.find(b=>b.id===id);const done=isDone(id);const confirmedData=getConfirmed(id);const mr=document.getElementById("modal-root");mr.innerHTML=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><div style="font-size:22px;margin-bottom:12px">${done?"✅":"💳"}</div><div style="font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:6px">${bank.name}</div>${done?`<div style="font-size:12px;color:#34d399;margin-bottom:4px">✓ 已確認繳款</div><div style="font-size:11px;color:#475569;margin-bottom:16px">確認時間：${fmtTime(confirmedData.ts)}</div>`:`<div style="font-size:13px;color:#64748b;margin-bottom:16px">確定已完成繳款了嗎？</div>`}<div style="display:flex;gap:10px;justify-content:center">${done?`<button onclick="closeModal()" style="flex:1;padding:10px;border:1px solid #334155;background:none;color:#94a3b8;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px">關閉</button><button onclick="doConfirm(${id})" style="flex:1;padding:10px;border:none;background:rgba(239,68,68,.15);color:#f87171;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600">取消確認</button>`:`<button onclick="closeModal()" style="flex:1;padding:10px;border:1px solid #334155;background:none;color:#94a3b8;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px">取消</button><button onclick="doConfirm(${id})" style="flex:1;padding:10px;border:none;background:rgba(52,211,153,.15);color:#34d399;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600">確認</button>`}</div></div></div>`;}function doConfirm(id){const k=monthKey();if(!confirmed[k])confirmed[k]={};if(confirmed[k][id])delete confirmed[k][id];else confirmed[k][id]={ts:Date.now()};localStorage.setItem("confirmed",JSON.stringify(confirmed));closeModal();showBanner(isDone(id)?"✓ 已標記確認！":"已取消確認");render();}function closeModal(){document.getElementById("modal-root").innerHTML="";}function resetAll(){if(!confirm("確定要重置本月所有確認記錄嗎？"))return;const k=monthKey();delete confirmed[k];localStorage.setItem("confirmed",JSON.stringify(confirmed));render();}function isDismissed(id){const k=monthKey();return !!(dismissedNotifs[k]&&dismissedNotifs[k][id]);}function dismissAlert(id){const k=monthKey();if(!dismissedNotifs[k])dismissedNotifs[k]={};dismissedNotifs[k][id]=true;localStorage.setItem("dismissedNotifs",JSON.stringify(dismissedNotifs));render();}function dismissAllAlerts(){const alerts=getPageAlerts();const k=monthKey();if(!dismissedNotifs[k])dismissedNotifs[k]={};alerts.forEach(a=>{dismissedNotifs[k][a.id]=true;});localStorage.setItem("dismissedNotifs",JSON.stringify(dismissedNotifs));render();}function getPageAlerts(){const alerts=[];WAVES.forEach(w=>{const cd=getWD(w);const days=daysTo(cd);const manualBanks=w.banks.map(id=>BANKS.find(b=>b.id===id)).filter(b=>b&&b.type==="manual");const unconfirmed=manualBanks.filter(b=>!isDone(b.id));if(days===0)alerts.push({id:"wave-check-"+w.id,level:"today",icon:"📋",title:w.label+"檢查日到了！",body:"今天（"+fmt(cd)+"）請確認各卡繳款狀態"});else if(days===1)alerts.push({id:"wave-soon-"+w.id,level:"urgent",icon:"⚡",title:w.label+"明天要對帳！",body:"明天（"+fmt(cd)+"）是"+w.label+"對帳日"});else if(days<=3&&days>1)alerts.push({id:"wave-3-"+w.id,level:"soon",icon:"🔔",title:w.label+"即將對帳",body:days+"天後（"+fmt(cd)+"）是"+w.label+"對帳日"});unconfirmed.forEach(b=>{const due=getDue(b.day);if(!due)return;const dd=daysTo(due);if(dd<=3&&dd>=0){const level=dd===0?"urgent":dd===1?"today":"soon";alerts.push({id:"bank-"+b.id,level,icon:dd===0?"🚨":dd===1?"⚠️":"💳",title:b.name+(dd===0?" 今日截止！":dd===1?" 明日截止！":" 即將截止"),body:"截止日："+fmt(due)+"（手動繳款）"});}});});return alerts.filter(a=>!isDismissed(a.id));}function doNotify(){if(localStorage.getItem("rem")!=="1"||Notification.permission!=="granted")return;WAVES.forEach(w=>{const days=daysTo(getWD(w));if(![0,1,3].includes(days))return;const m=w.banks.map(id=>BANKS.find(b=>b.id===id)).filter(b=>b&&b.type==="manual").map(b=>b.name);new Notification(days===0?"💳 今天是"+w.label+"檢查日！":"💳 "+w.label+"還有"+days+"天",{body:m.length?"手動繳費："+m.join("、"):"請確認各卡狀態"});});}doNotify();setInterval(doNotify,3600000);async function toggleNotif(){if(!remOn){const p=await Notification.requestPermission();if(p==="granted"){localStorage.setItem("rem","1");remOn=true;showBanner("✓ 通知已開啟！");doNotify();}else showBanner("⚠ 請允許通知");}else{localStorage.setItem("rem","0");remOn=false;render();}}function setFw(v){fw=v;render();}function render(){const nextW=WAVES.map(w=>({...w,cd:getWD(w),dl:daysTo(getWD(w))})).filter(w=>w.dl>=0).sort((a,b)=>a.dl-b.dl)[0];const banks=fw==="all"?BANKS:BANKS.filter(b=>String(b.wave)===fw);const manual=BANKS.filter(b=>b.type==="manual");const doneCount=BANKS.filter(b=>isDone(b.id)).length;const ds=today.getFullYear()+"/"+(today.getMonth()+1).toString().padStart(2,"0")+"/"+today.getDate().toString().padStart(2,"0");const alerts=getPageAlerts();const levelColor={urgent:"#ef4444",today:"#fbbf24",soon:"#3b82f6"};const dotClass={urgent:"red",today:"yellow",soon:"blue"};const alertsHtml=alerts.length>0?`<div class="notif-panel"><div class="notif-panel-header"><div style="display:flex;align-items:center;gap:8px"><span class="pulse" style="width:7px;height:7px;border-radius:50%;background:#ef4444;display:inline-block"></span><span style="font-size:11px;color:#94a3b8;font-weight:600">ALERTS · ${alerts.length} 則提醒</span></div><button onclick="dismissAllAlerts()" style="background:none;border:1px solid #1e2330;color:#475569;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:10px;font-family:inherit">全部關閉</button></div>${alerts.map(a=>`<div class="notif-item ${a.level}"><span class="notif-dot ${dotClass[a.level]}"></span><div style="flex:1;min-width:0"><div style="
