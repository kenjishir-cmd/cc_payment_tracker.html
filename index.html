<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/><title>信用卡繳款管理</title><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/><style>
/* 基礎樣式修復 */
html, body { background:#0a0c10; color:#e2e8f0; font-family:'Noto Sans TC',sans-serif; margin:0; padding:0; width:100%; min-height:100%; }
#app { width: 100%; display: block; }
* { box-sizing: border-box; margin: 0; padding: 0; }
.card { background:#111318; border:1px solid #1e2330; border-radius:12px; margin-bottom:14px; overflow:hidden; }
.stat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:14px; padding:0 12px; }
.stat-card { background:#0e1117; border:1px solid #1e2330; border-radius:10px; padding:14px; }
.wave-btn { border:1px solid #1e2330; background:#111318; color:#64748b; border-radius:8px; padding:6px 10px; cursor:pointer; font-size:11px; }
.wave-btn.active { background:#1e293b; border-color:#3b82f6; color:#60a5fa; }
.row { border-bottom:1px solid #1a1f2e; padding:12px 14px; display:flex; align-items:center; gap:10px; }
.row:last-child { border-bottom:none; }
.avatar { width:30px; height:30px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
.chip { display:inline-flex; align-items:center; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:500; }
.manual { background:rgba(239,68,68,0.1); color:#f87171; border:1px solid rgba(239,68,68,0.2); }
.auto { background:rgba(52,211,153,0.1); color:#34d399; border:1px solid rgba(52,211,153,0.2); }
.due-info { color: #a78bfa; font-size: 13px; margin-top: 4px; font-weight: 500; }
.cbtn { border:1px solid #334155; background:none; color:#94a3b8; border-radius:8px; padding:5px 12px; cursor:pointer; font-size:11px; }
.cbtn.cancel { color:#f87171; border-color:rgba(239,68,68,0.3); margin-top:4px; }
.tab-nav { display:flex; gap:4px; padding:10px; border-top:1px solid #1e2330; background:#0a0c10; position:fixed; bottom:0; left:0; right:0; z-index:100; justify-content:center; }
.tab-btn { padding:10px 30px; border-radius:10px; border:1px solid #1e2330; background:none; color:#64748b; font-size:13px; cursor:pointer; }
.tab-btn.active { background:#1e293b; border-color:#3b82f6; color:#60a5fa; }
.page-content { padding:16px 12px 160px 12px; } /* 底部留白 160px 確保富邦不被遮擋 */
.version-badge { background:rgba(99,102,241,0.1); border:1px solid rgba(99,102,241,0.3); color:#818cf8; border-radius:20px; padding:2px 8px; font-size:10px; cursor:pointer; }
.reset-info-bar { background:rgba(96,165,250,0.1); border:1px solid rgba(96,165,250,0.2); border-radius:10px; padding:10px 14px; margin-bottom:14px; font-size:12px; color:#60a5fa; display:flex; justify-content:space-between; }
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:500; display:flex; align-items:center; justify-content:center; padding:20px; }
.modal { background:#111318; border:1px solid #1e2330; border-radius:16px; padding:24px; width:100%; max-width:300px; text-align:center; }
.month-header { background:#0e1117; border:1px solid #1e2330; border-radius:10px; margin-bottom:10px; overflow:hidden; }
.month-header-title { padding:12px 14px; display:flex; justify-content:space-between; cursor:pointer; font-size:14px; }
.sheet-table { width:100%; border-collapse:collapse; font-size:12px; }
.sheet-table td { padding:10px; border-bottom:1px solid #1a1f2e; color:#94a3b8; }
</style></head><body>
<div id="app"></div><div id="modal-root"></div>
<script>
// --- 版本與資料定義 ---
const VERSIONS=[
  {num:"3.7.2",date:"2026-05-04",changes:["✦ 解決 PWA 黑畫面相容性問題","✦ 再次增加底部間距避免遮擋台北富邦","✦ 強化資料自動修復邏輯"]},
  {num:"3.7.1",date:"2026-05-04",changes:["✦ 修復底部導覽遮擋","✦ 優化每月重置邏輯"]},
  {num:"3.7.0",date:"2026-05-04",changes:["✦ 每月自動封存功能","✦ 紫色加大顯示結帳資訊"]}
];
const VERSION=VERSIONS[0];
const BANKS=[
  {id:9,name:"中國信託",day:20,type:"auto",wave:1},
  {id:10,name:"兆豐銀行",day:21,type:"manual",wave:1,dueDay:6},
  {id:11,name:"彰化銀行",day:31,type:"manual",wave:1},
  {id:1,name:"遠東商銀",day:2,type:"manual",wave:2},
  {id:2,name:"國泰世華",day:3,type:"auto",wave:2},
  {id:3,name:"華南銀行",day:7,type:"auto",wave:2},
  {id:4,name:"玉山銀行",day:7,type:"auto",wave:2},
  {id:5,name:"聯邦銀行",day:9,type:"auto",wave:3},
  {id:6,name:"元大銀行",day:10,type:"manual",wave:3},
  {id:7,name:"台新銀行",day:12,type:"auto",wave:3},
  {id:8,name:"新光銀行",day:14,type:"auto",wave:3},
  {id:12,name:"台北富邦",day:null,type:"manual",wave:null}
];
const WAVES=[{id:1,label:"第一波",day:4,color:"#34d399"},{id:2,label:"第二波",day:18,color:"#60a5fa"},{id:3,label:"第三波",day:25,color:"#a78bfa"}];

// --- 狀態管理 (加入 Try-Catch 避免黑畫面) ---
let confirmed={}, history={}, currentTab="dashboard", fw="all", autoResetMsg="", sheetExpandedMonths={};
try {
  confirmed = JSON.parse(localStorage.getItem("confirmed") || "{}");
  history = JSON.parse(localStorage.getItem("payHistory") || "{}");
} catch(e) {
  console.error("Data error, resetting...");
  localStorage.setItem("confirmed", "{}");
}

function monthKey() { const t=new Date(); return t.getFullYear()+"-"+(t.getMonth()+1); }

// --- 自動重置與封存 ---
(function runAutoReset(){
  const curK=monthKey(); const lastK=localStorage.getItem("lastSeenMonth");
  if(lastK && lastK !== curK) {
    const data=confirmed[lastK] || {};
    if(Object.keys(data).length > 0) {
      if(!history[lastK]) history[lastK]={};
      Object.keys(data).forEach(id => {
        const b=BANKS.find(x=>x.id==id);
        if(b) history[lastK][id]={ts:data[id].ts, bankName:b.name, wave:b.wave, type:b.type};
      });
      localStorage.setItem("payHistory", JSON.stringify(history));
    }
    confirmed = {}; localStorage.setItem("confirmed", "{}");
    autoResetMsg = `${lastK} 記錄已存至歷史，新月份開始！`;
  }
  localStorage.setItem("lastSeenMonth", curK);
})();

// --- 工具函數 ---
function getDue(b){
  if(!b.day)return null; const t=new Date();
  if(b.dueDay) return new Date(t.getFullYear(), t.getMonth(), b.dueDay);
  const ref=b.wave===1?new Date(t.getFullYear(),t.getMonth()-1,1):new Date(t.getFullYear(),t.getMonth(),1);
  const bill=new Date(ref.getFullYear(),ref.getMonth(),Math.min(b.day, new Date(ref.getFullYear(),ref.getMonth()+1,0).getDate()));
  const d=new Date(bill); d.setDate(d.getDate()+18); return d;
}
function isDone(id){ const k=monthKey(); return !!(confirmed[k] && confirmed[k][id]); }
function fmt(d){ return d? (d.getMonth()+1)+"/"+d.getDate() : "—"; }
function fmtT(ts){ if(!ts)return ""; const d=new Date(ts); return (d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,'0')+":"+String(d.getMinutes()).padStart(2,'0'); }

// --- 渲染邏輯 ---
function render(){
  const app=document.getElementById("app");
  const curK=monthKey();
  const header=`<div style="border-bottom:1px solid #1e2330;padding:15px;display:flex;justify-content:space-between;align-items:center">
    <div><span style="font-size:18px;font-weight:700">信用卡管理</span> <span class="version-badge" onclick="showVer()">v${VERSION.num}</span></div>
    <div style="font-size:12px;color:#64748b">${new Date().toLocaleDateString()}</div></div>`;
  const tabs=`<div class="tab-nav"><button class="tab-btn ${currentTab==='dashboard'?'active':''}" onclick="currentTab='dashboard';render()">📊 總覽</button>
    <button class="tab-btn ${currentTab==='sheet'?'active':''}" onclick="currentTab='sheet';render()">📋 歷史</button></div>`;

  if(currentTab==="sheet"){
    const sorted=Object.keys(history).sort((a,b)=>b.localeCompare(a));
    let hContent = sorted.map(mk=>{
      const entries=Object.values(history[mk]); const isExp=sheetExpandedMonths[mk]!==false;
      return `<div class="month-header"><div class="month-header-title" onclick="toggleM('${mk}')"><b>${mk}</b> (${entries.length}筆) <span>${isExp?'▾':'▸'}</span></div>
      ${isExp?`<table class="sheet-table">${entries.map(e=>`<tr><td>${e.bankName}</td><td style="text-align:right">${fmtT(e.ts)}</td></tr>`).join("")}</table>`:''}</div>`;
    }).join("");
    app.innerHTML=header+`<div class="page-content">${hContent||'<div style="text-align:center;padding:40px;color:#475569">尚無歷史記錄</div>'}</div>`+tabs;
    return;
  }

  const doneCount=BANKS.filter(b=>isDone(b.id)).length;
  const list=fw==='all'?BANKS:BANKS.filter(b=>b.wave==fw);
  
  app.innerHTML=header+`<div class="page-content">
    ${autoResetMsg?`<div class="reset-info-bar"><span>🔄 ${autoResetMsg}</span><span onclick="autoResetMsg='';render()">✕</span></div>`:''}
    <div class="stat-grid"><div class="stat-card"><div style="font-size:10px;color:#64748b">本月進度</div><div style="font-size:24px;font-weight:700;color:#34d399">${doneCount}/${BANKS.length}</div></div>
    <div class="stat-card"><div style="font-size:10px;color:#64748b">今天日期</div><div style="font-size:24px;font-weight:700;color:#60a5fa">${new Date().getDate()}號</div></div></div>
    <div class="card"><div style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1f2e">
      <div style="display:flex;gap:5px">${['all',1,2,3].map(v=>`<button class="wave-btn ${fw==v?'active':''}" onclick="fw='${v}';render()">${v=='all'?'全':v}</button>`).join("")}</div>
      <button onclick="reset()" style="background:none;border:none;color:#f87171;font-size:12px">重置本月</button></div>
      ${list.map(b=>{
        const done=isDone(b.id); const due=getDue(b); const wave=WAVES.find(w=>w.id==b.wave);
        return `<div class="row" style="opacity:${done?0.5:1}">
          <div class="avatar" style="background:${wave?wave.color+'20':'#1e2330'};color:${wave?wave.color:'#475569'}">${b.name[0]}</div>
          <div style="flex:1"><div style="font-size:15px;font-weight:500">${b.name}</div>
          <div class="due-info">${b.day?`截止 ${fmt(due)}`:'無結帳日'}</div></div>
          <div style="text-align:right"><span class="chip ${b.type==='manual'?'manual':'auto'}">${b.type==='manual'?'手動':'自動'}</span><br>
          ${!done?`<button class="cbtn" style="margin-top:5px" onclick="confirmB(${b.id})">確認</button>`:`<button class="cbtn cancel" onclick="cancelB(${b.id})">取消</button>`}</div></div>`;
      }).join("")}</div></div>`+tabs;
}

// --- 事件處理 ---
window.confirmB=(id)=>{ const k=monthKey(); if(!confirmed[k])confirmed[k]={}; confirmed[k][id]={ts:Date.now()}; localStorage.setItem("confirmed",JSON.stringify(confirmed)); render(); };
window.cancelB=(id)=>{ const k=monthKey(); if(confirmed[k])delete confirmed[k][id]; localStorage.setItem("confirmed",JSON.stringify(confirmed)); render(); };
window.reset=()=>{ if(confirm("確定重置本月？")){ const k=monthKey(); confirmed[k]={}; localStorage.setItem("confirmed","{}"); render(); } };
window.toggleM=(k)=>{ sheetExpandedMonths[k]=!sheetExpandedMonths[k]; render(); };
window.showVer=()=>{ alert(VERSIONS.map(v=>`v${v.num} (${v.date})\n${v.changes.join('\n')}`).join('\n\n')); };

// --- 啟動 ---
render();

// --- PWA Service Worker 註冊 (強迫更新) ---
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js?t='+Date.now()).then(reg=>{
    reg.onupdatefound=()=>{ const i=reg.installing; i.onstatechange=()=>{ if(i.state==='installed'&&navigator.serviceWorker.controller) window.location.reload(); }; };
  });
}
</script></body></html>
