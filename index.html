<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/><title>信用卡繳款管理</title><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/><style>
html { background:#0a0c10; overscroll-behavior-y: none; }
body {
  background:#0a0c10; color:#e2e8f0; font-family:'Noto Sans TC',sans-serif;
  margin:0; padding:0; min-height:100vh; overscroll-behavior-y: none;
}
#app { width: 100%; min-height: 100vh; }
*{box-sizing:border-box;margin:0;padding:0}.card{background:#111318;border:1px solid #1e2330;border-radius:12px;margin-bottom:14px}.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}.stat-card{background:#0e1117;border:1px solid #1e2330;border-radius:10px;padding:14px}.wave-btn{border:1px solid #1e2330;background:#111318;color:#64748b;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:inherit}.wave-btn.active{background:#1e293b;border-color:#3b82f6;color:#60a5fa}.row{border-bottom:1px solid #1a1f2e;padding:11px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}.row:last-child{border-bottom:none}.avatar{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}.manual{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}.auto{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2)}.w1{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2);border-radius:6px}.w2{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.2);border-radius:6px}.w3{background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.2);border-radius:6px}.pulse{animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.banner{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:#052e16;border:1px solid rgba(52,211,153,.3);color:#34d399;padding:9px 16px;border-radius:10px;font-size:12px;z-index:999;white-space:nowrap}.offline-banner{background:#450a0a!important;color:#f87171!important;border-color:rgba(239,68,68,0.3)!important}
.due-info { color: #a78bfa; font-size: 13px; margin-top: 4px; font-weight: 500; }
.cbtn{border:1px solid #334155;background:none;color:#64748b;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:11px;font-family:inherit;margin-top:4px}.cbtn.done{background:rgba(52,211,153,.1);color:#34d399;border-color:rgba(52,211,153,.3)}.cbtn.cancel{background:rgba(239,68,68,.08);color:#f87171;border-color:rgba(239,68,68,.2);margin-top:4px}.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}.modal{background:#111318;border:1px solid #1e2330;border-radius:16px;padding:24px;width:100%;max-width:320px;text-align:center}.version-badge{display:inline-flex;align-items:center;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);color:#818cf8;border-radius:20px;padding:2px 10px;font-size:10px;font-weight:600;letter-spacing:.5px;cursor:pointer}.notif-panel{background:#0e1117;border:1px solid #1e2330;border-radius:12px;margin-bottom:14px;overflow:hidden}.notif-panel-header{padding:12px 14px;border-bottom:1px solid #1a1f2e;display:flex;align-items:center;justify-content:space-between}.notif-item{padding:10px 14px;border-bottom:1px solid #1a1f2e;display:flex;align-items:center;gap:10px}.notif-item:last-child{border-bottom:none}.dismiss-btn{background:none;border:1px solid #1e2330;color:#475569;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:10px;font-family:inherit;flex-shrink:0}.tab-nav{display:flex;gap:4px;padding:10px 16px;border-top:1px solid #1e2330;background:#0a0c10;position:fixed;bottom:0;left:0;right:0;z-index:100;justify-content:center}.tab-btn{padding:9px 32px;border-radius:10px;border:1px solid #1e2330;background:none;color:#64748b;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}.tab-btn.active{background:#1e293b;border-color:#3b82f6;color:#60a5fa}
.page-content{padding-bottom:140px} /* 增加底部間距防止遮擋 */
.sheet-table{width:100%;border-collapse:collapse;font-size:12px}.sheet-table th{background:#0e1117;color:#475569;font-size:10px;font-weight:600;padding:8px 12px;text-align:left;border-bottom:1px solid #1e2330;letter-spacing:.5px}.sheet-table td{padding:9px 12px;border-bottom:1px solid #1a1f2e;color:#94a3b8;vertical-align:middle}.sheet-table tr:last-child td{border-bottom:none}.month-header{background:#0e1117;border:1px solid #1e2330;border-radius:10px;margin-bottom:10px;overflow:hidden}.month-header-title{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}.wave3-done-banner{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.2);border-radius:10px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px}.reset-info-bar{background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:12px;color:#60a5fa}</style></head><body>
<div id="app"></div>
<div id="modal-root"></div>
<script>
const VERSIONS=[
  {num:"3.7.1",date:"2026-05-04",changes:[
    "✦ 修復底部導覽列遮擋最後一項銀行的問題",
    "✦ 強化每月自動重置邏輯，確保舊資料不殘留",
    "✦ 優化資訊對比度"
  ]},
  {num:"3.7.0",date:"2026-05-04",changes:[
    "✦ 新增每月自動重置與歷史自動封存功能",
    "✦ 結帳資訊改為紫色加大顯示",
    "✦ 重構波段：4號為第一波(綠色)/18號第二波/25號第三波"
  ]}
];
const VERSION=VERSIONS[0];

const BANKS=[
  {id:9,name:"中國信託",day:20,type:"auto",wave:1,dueDay:null},
  {id:10,name:"兆豐銀行",day:21,type:"manual",wave:1,dueDay:6},
  {id:11,name:"彰化銀行",day:31,type:"manual",wave:1,dueDay:null},
  {id:1,name:"遠東商銀",day:2,type:"manual",wave:2,dueDay:null},
  {id:2,name:"國泰世華",day:3,type:"auto",wave:2,dueDay:null},
  {id:3,name:"華南銀行",day:7,type:"auto",wave:2,dueDay:null},
  {id:4,name:"玉山銀行",day:7,type:"auto",wave:2,dueDay:null},
  {id:5,name:"聯邦銀行",day:9,type:"auto",wave:3,dueDay:null},
  {id:6,name:"元大銀行",day:10,type:"manual",wave:3,dueDay:null},
  {id:7,name:"台新銀行",day:12,type:"auto",wave:3,dueDay:null},
  {id:8,name:"新光銀行",day:14,type:"auto",wave:3,dueDay:null},
  {id:12,name:"台北富邦",day:null,type:"manual",wave:null,dueDay:null}
];

const WAVES=[
  {id:1,label:"第一波",checkDay:4,banks:[9,10,11],color:"#34d399"},
  {id:2,label:"第二波",checkDay:18,banks:[1,2,3,4],color:"#60a5fa"},
  {id:3,label:"第三波",checkDay:25,banks:[5,6,7,8],color:"#a78bfa"}
];

function getDue(bank){
  if(!bank.day)return null;
  if(bank.dueDay){const t=new Date();return new Date(t.getFullYear(),t.getMonth(),bank.dueDay);}
  const t=new Date();
  const refMonth=bank.wave===1?new Date(t.getFullYear(),t.getMonth()-1,1):new Date(t.getFullYear(),t.getMonth(),1);
  const billingDate=new Date(refMonth.getFullYear(),refMonth.getMonth(),Math.min(bank.day,new Date(refMonth.getFullYear(),refMonth.getMonth()+1,0).getDate()));
  const due=new Date(billingDate);due.setDate(due.getDate()+18);return due;
}
function getWD(w){const t=new Date();return new Date(t.getFullYear(),t.getMonth(),w.checkDay);}
function daysTo(d){const t=new Date();t.setHours(0,0,0,0);return Math.ceil((d-t)/86400000);}
function fmt(d){return d?d.getMonth()+1+"/"+d.getDate():"—";}
function fmtTime(ts){if(!ts)return"";const d=new Date(ts);return(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function monthKey(){const t=new Date();return t.getFullYear()+"-"+(t.getMonth()+1);}
function curWave(){const d=new Date().getDate();return d<=4?1:d<=18?2:3;}

let fw="all",banner="",bTimer=null,isOffline=false,autoResetMsg="";
let confirmed=JSON.parse(localStorage.getItem("confirmed")||"{}");
let history=JSON.parse(localStorage.getItem("payHistory")||"{}");
let dismissedNotifs=JSON.parse(localStorage.getItem("dismissedNotifs")||"{}");
let currentTab="dashboard",sheetExpandedMonths={};
const today=new Date(),cw=curWave();

// ── 自動重置邏輯 (優化版) ──
(function runAutoReset(){
  const curK=monthKey();const lastK=localStorage.getItem("lastSeenMonth");
  if(!lastK){
    // 第一次執行，若有非本月資料則封存
    const keys=Object.keys(confirmed);
    if(keys.length>0 && !confirmed[curK]){
      keys.forEach(k=>archiveMonth(k));
      confirmed={};localStorage.setItem("confirmed","{}");
    }
    localStorage.setItem("lastSeenMonth",curK);return;
  }
  if(lastK!==curK){
    archiveMonth(lastK);
    confirmed={};localStorage.setItem("confirmed","{}");
    localStorage.setItem("lastSeenMonth",curK);
    autoResetMsg=`${lastK} 記錄已封存，本月重新開始！`;
  }
})();
function archiveMonth(k){
  const data=confirmed[k]||{}; if(!Object.keys(data).length)return;
  if(!history[k])history[k]={};
  Object.keys(data).forEach(id=>{
    const b=BANKS.find(x=>x.id===Number(id));
    if(b)history[k][id]={ts:data[id].ts,bankName:b.name,wave:b.wave,type:b.type,day:b.day};
  });
  localStorage.setItem("payHistory",JSON.stringify(history));
}

window.addEventListener('offline',()=>{isOffline=true;showBanner("📵 離線模式",true);});
window.addEventListener('online',()=>{isOffline=false;showBanner("✅ 恢復連線");});

function showBanner(msg,p=false){banner=msg;render();if(bTimer)clearTimeout(bTimer);if(!p)bTimer=setTimeout(()=>{banner="";render();},3000);}
function getConfirmed(id){const k=monthKey();return confirmed[k]&&confirmed[k][id]?confirmed[k][id]:null;}
function isDone(id){return !!getConfirmed(id);}
function closeModal(){document.getElementById("modal-root").innerHTML="";}

function confirmPay(id){
  const b=BANKS.find(x=>x.id===id);
  document.getElementById("modal-root").innerHTML=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
    <div style="font-size:22px;margin-bottom:12px">💳</div><div style="font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:6px">${b.name}</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:20px">確定已完成繳款？</div>
    <div style="display:flex;gap:10px"><button onclick="closeModal()" style="flex:1;padding:10px;border:1px solid #334155;background:none;color:#94a3b8;border-radius:10px">取消</button>
    <button onclick="doConfirm(${id})" style="flex:1;padding:10px;border:none;background:rgba(52,211,153,0.15);color:#34d399;border-radius:10px;font-weight:600">確認</button></div></div></div>`;
}
function cancelPay(id){
  const b=BANKS.find(x=>x.id===id);const cd=getConfirmed(id);
  document.getElementById("modal-root").innerHTML=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
    <div style="font-size:22px;margin-bottom:12px">↩️</div><div style="font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:6px">${b.name}</div>
    <div style="font-size:11px;color:#475569;margin-bottom:16px">確認時間：${fmtTime(cd.ts)}<br><br>確定取消？</div>
    <div style="display:flex;gap:10px"><button onclick="closeModal()" style="flex:1;padding:10px;border:1px solid #334155;background:none;color:#94a3b8;border-radius:10px">保留</button>
    <button onclick="doCancel(${id})" style="flex:1;padding:10px;border:none;background:rgba(239,68,68,0.15);color:#f87171;border-radius:10px;font-weight:600">取消確認</button></div></div></div>`;
}
function doConfirm(id){const k=monthKey();if(!confirmed[k])confirmed[k]={};confirmed[k][id]={ts:Date.now()};localStorage.setItem("confirmed",JSON.stringify(confirmed));closeModal();showBanner("✓ 已標記！");render();}
function doCancel(id){const k=monthKey();if(confirmed[k])delete confirmed[k][id];localStorage.setItem("confirmed",JSON.stringify(confirmed));closeModal();showBanner("已取消");render();}
function resetAll(){if(confirm("重置本月？")){const k=monthKey();delete confirmed[k];localStorage.setItem("confirmed",JSON.stringify(confirmed));render();}}
function dismissAlert(id){const k=monthKey();if(!dismissedNotifs[k])dismissedNotifs[k]={};dismissedNotifs[k][id]=true;localStorage.setItem("dismissedNotifs",JSON.stringify(dismissedNotifs));render();}
function getPageAlerts(){
  const al=[];WAVES.forEach(w=>{
    const days=daysTo(getWD(w));const un=w.banks.map(id=>BANKS.find(b=>b.id===id)).filter(b=>b&&b.type==="manual"&&!isDone(b.id));
    if(days===0)al.push({id:"w-"+w.id,level:"today",icon:"📋",title:w.label+"檢查！",body:"今天請對帳"});
    un.forEach(b=>{const due=getDue(b);if(due && daysTo(due)<=1)al.push({id:"b-"+b.id,level:"urgent",icon:"🚨",title:b.name+"截止",body:"截止日:"+fmt(due)});});
  });
  return al.filter(a=>!isDismissed(a.id));
}

function renderSheetPage(){
  const k=monthKey();const curData=confirmed[k]||{};const all={};
  Object.keys(history).forEach(mk=>{if(!all[mk])all[mk]={};Object.assign(all[mk],history[mk]);});
  Object.keys(curData).forEach(id=>{if(!all[k])all[k]={};if(!all[k][id]){const b=BANKS.find(x=>x.id===Number(id));if(b)all[k][id]={ts:curData[id].ts,bankName:b.name,wave:b.wave,type:b.type};}});
  const sorted=Object.keys(all).sort((a,b)=>b.localeCompare(a));
  if(!sorted.length)return `<div style="text-align:center;padding:40px;color:#475569">無記錄</div>`;
  return sorted.map(mk=>{
    const entries=Object.values(all[mk]);const isExp=sheetExpandedMonths[mk]!==false;
    const rows=entries.map(e=>`<tr><td>${e.bankName}</td><td style="color:#34d399">${fmtTime(e.ts)}</td></tr>`).join("");
    return `<div class="month-header"><div class="month-header-title" onclick="toggleSheetMonth('${mk}')"><b>${mk}</b> (${entries.length}筆) <span>${isExp?"▾":"▸"}</span></div>
    ${isExp?`<table class="sheet-table"><thead><tr><th>銀行</th><th>時間</th></tr></thead><tbody>${rows}</tbody></table>`:""}</div>`;
  }).join("");
}

function render(){
  const ds=today.getFullYear()+"/"+(today.getMonth()+1)+"/"+today.getDate();
  const bannerHtml=banner?`<div class="banner ${isOffline?"offline-banner":""}">${banner}</div>`:"";
  const resetBar=autoResetMsg?`<div class="reset-info-bar">🔄 ${autoResetMsg} <button onclick="autoResetMsg='';render()" style="background:none;border:none;color:#60a5fa;margin-left:auto">✕</button></div>`:"";
  const header=`<div style="border-bottom:1px solid #1e2330;padding:14px 16px;display:flex;justify-content:space-between;align-items:center">
    <div><span style="font-size:18px;font-weight:700;color:#f1f5f9">信用卡繳款管理</span> <span class="version-badge" onclick="showVersionHistory()">v${VERSION.num}</span></div>
    <div style="text-align:right;font-size:12px;color:#94a3b8">${ds}</div></div>`;
  const tabs=`<div class="tab-nav"><button class="tab-btn ${currentTab==="dashboard"?"active":""}" onclick="currentTab='dashboard';render()">📊 總覽</button>
    <button class="tab-btn ${currentTab==="sheet"?"active":""}" onclick="currentTab='sheet';render()">📋 歷史</button></div>`;

  if(currentTab==="sheet"){
    document.getElementById("app").innerHTML=bannerHtml+header+`<div class="page-content" style="padding:16px 12px">${resetBar}${renderSheetPage()}</div>`+tabs;return;
  }

  const al=getPageAlerts();const done=BANKS.filter(b=>isDone(b.id)).length;
  document.getElementById("app").innerHTML=bannerHtml+header+`<div class="page-content" style="padding:16px 12px">
    ${resetBar}
    <div class="stat-grid"><div class="stat-card"><div style="font-size:9px;color:#475569">已確認</div><div style="font-size:26px;font-weight:700;color:#34d399">${done}/${BANKS.length}</div></div>
    <div class="stat-card"><div style="font-size:9px;color:#475569">當前波段</div><div style="font-size:26px;font-weight:700;color:#60a5fa">${cw}</div></div></div>
    <div class="card" style="padding:12px"><div style="display:flex;justify-content:space-between">
      ${WAVES.map(w=>`<div style="text-align:center;flex:1"><div style="width:30px;height:30px;border-radius:50%;background:${w.id<=cw?w.color:"#1a2035"};margin:0 auto;line-height:30px;font-weight:700;color:#0a0c10">${isDone(w.banks[0])?"✓":w.id}</div><div style="font-size:11px;margin-top:4px">${w.label}</div></div>`).join("")}
    </div></div>
    <div class="card">
      <div style="padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1f2e">
        <span style="font-size:11px;color:#475569">銀行清單</span>
        <button onclick="resetAll()" style="background:none;border:1px solid #334155;color:#f87171;padding:4px 8px;border-radius:6px;font-size:11px">重置</button>
      </div>
      ${BANKS.map(b=>{
        const wave=WAVES.find(w=>w.id===b.wave);const due=getDue(b);const done=isDone(b.id);const cd=getConfirmed(b.id);
        return `<div class="row" style="opacity:${done?0.55:1}"><div class="avatar" style="background:${wave?wave.color+"18":"#1e2330"};color:${wave?wave.color:"#475569"}">${b.name[0]}</div>
          <div style="flex:1"><div style="font-size:14px;font-weight:500;color:#cbd5e1">${b.name}</div>
          <div class="due-info">${b.day?"結帳 "+b.day+" 號 → 截止 "+fmt(due):"結帳日未知"}</div>
          ${done && cd?`<div style="font-size:10px;color:#34d399">✓ ${fmtTime(cd.ts)}</div>`:""}</div>
          <div style="text-align:right">
            <span class="chip ${b.type==="manual"?"manual":"auto"}">${b.type==="manual"?"⚠":"✓"}</span>
            <div style="margin-top:4px">${!done?`<button class="cbtn" onclick="confirmPay(${b.id})">確認</button>`:`<button class="cbtn cancel" onclick="cancelPay(${b.id})">取消</button>`}</div>
          </div></div>`;
      }).join("")}
    </div></div>`+tabs;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js?t=' + new Date().getTime()).then(reg => {
    reg.onupdatefound = () => {
      const iw = reg.installing;
      iw.onstatechange = () => { if (iw.state === 'installed' && navigator.serviceWorker.controller) window.location.reload(); };
    };
  });
}
function showVersionHistory(){
  const mr=document.getElementById("modal-root");
  mr.innerHTML=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()" style="max-height:80vh;overflow-y:auto;text-align:left">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div style="font-size:16px;font-weight:700;color:#f1f5f9">📋 更新履歷</div><button onclick="closeModal()" style="background:none;border:1px solid #334155;color:#64748b;border-radius:8px;padding:4px 10px">關閉</button></div>
    ${VERSIONS.map(v=>`<div style="margin-bottom:16px;border-bottom:1px solid #1e2330;padding-bottom:10px"><span style="color:#818cf8;font-weight:700">v${v.num}</span> <span style="font-size:11px;color:#475569">${v.date}</span><div style="font-size:12px;color:#64748b;margin-top:4px">${v.changes.map(c=>`<div>${c}</div>`).join("")}</div></div>`).join("")}
  </div></div>`;
}
function toggleSheetMonth(k){sheetExpandedMonths[k]=!sheetExpandedMonths[k];render();}
window.confirmPay=confirmPay;window.cancelPay=cancelPay;window.doConfirm=doConfirm;window.doCancel=doCancel;window.closeModal=closeModal;window.resetAll=resetAll;window.dismissAlert=dismissAlert;window.showVersionHistory=showVersionHistory;window.toggleSheetMonth=toggleSheetMonth;
render();
</script></body></html>
