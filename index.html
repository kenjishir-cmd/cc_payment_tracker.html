<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/><title>信用卡繳款管理</title><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/><style>
/* v3.4.1 提高相容性佈局 */
html {
  background:#0a0c10;
  overscroll-behavior-y: none; /* 依然鎖定下拉刷新 */
}
body {
  background:#0a0c10;
  color:#e2e8f0;
  font-family:'Noto Sans TC',sans-serif;
  margin:0;
  padding:0;
  min-height:100vh;
  overscroll-behavior-y: none;
}
#app {
  width: 100%;
  min-height: 100vh;
}
*{box-sizing:border-box;margin:0;padding:0}.card{background:#111318;border:1px solid #1e2330;border-radius:12px;margin-bottom:14px}.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}.stat-card{background:#0e1117;border:1px solid #1e2330;border-radius:10px;padding:14px}.wave-btn{border:1px solid #1e2330;background:#111318;color:#64748b;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:inherit}.wave-btn.active{background:#1e293b;border-color:#3b82f6;color:#60a5fa}.row{border-bottom:1px solid #1a1f2e;padding:11px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}.row:last-child{border-bottom:none}.avatar{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}.manual{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}.auto{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2)}.w1{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2);border-radius:6px}.w2{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.2);border-radius:6px}.w3{background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.2);border-radius:6px}.pulse{animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.notif-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500}.notif-on{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25)}.notif-off{background:rgba(100,116,139,.08);color:#64748b;border:1px solid #1e2330}.banner{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:#052e16;border:1px solid rgba(52,211,153,.3);color:#34d399;padding:9px 16px;border-radius:10px;font-size:12px;z-index:999;white-space:nowrap}.offline-banner{background:#450a0a !important;color:#f87171 !important;border-color:rgba(239,68,68,0.3) !important}.cbtn{border:1px solid #334155;background:none;color:#64748b;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:11px;font-family:inherit;margin-top:4px}.cbtn.done{background:rgba(52,211,153,.1);color:#34d399;border-color:rgba(52,211,153,.3)}.cbtn.cancel{background:rgba(239,68,68,.08);color:#f87171;border-color:rgba(239,68,68,.2);margin-top:4px}.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}.modal{background:#111318;border:1px solid #1e2330;border-radius:16px;padding:24px;width:100%;max-width:320px;text-align:center}.version-badge{display:inline-flex;align-items:center;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);color:#818cf8;border-radius:20px;padding:2px 10px;font-size:10px;font-weight:600;letter-spacing:.5px;cursor:pointer}.notif-panel{background:#0e1117;border:1px solid #1e2330;border-radius:12px;margin-bottom:14px;overflow:hidden}.notif-panel-header{padding:12px 14px;border-bottom:1px solid #1a1f2e;display:flex;align-items:center;justify-content:space-between}.notif-item{padding:10px 14px;border-bottom:1px solid #1a1f2e;display:flex;align-items:center;gap:10px}.notif-item:last-child{border-bottom:none}.notif-item.urgent{background:rgba(239,68,68,.04)}.notif-item.today{background:rgba(251,191,36,.04)}.notif-item.soon{background:rgba(96,165,250,.03)}.notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.notif-dot.red{background:#ef4444}.notif-dot.yellow{background:#fbbf24}.notif-dot.blue{background:#3b82f6}.dismiss-btn{background:none;border:1px solid #1e2330;color:#475569;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:10px;font-family:inherit;flex-shrink:0}
.tab-nav{display:flex;gap:4px;padding:10px 16px;border-top:1px solid #1e2330;background:#0a0c10;position:fixed;bottom:0;left:0;right:0;z-index:100;justify-content:center}
.tab-btn{padding:9px 32px;border-radius:10px;border:1px solid #1e2330;background:none;color:#64748b;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.tab-btn.active{background:#1e293b;border-color:#3b82f6;color:#60a5fa}
.page-content{padding-bottom:100px}
.sheet-table{width:100%;border-collapse:collapse;font-size:12px}
.sheet-table th{background:#0e1117;color:#475569;font-size:10px;font-weight:600;padding:8px 12px;text-align:left;border-bottom:1px solid #1e2330;letter-spacing:.5px}
.sheet-table td{padding:9px 12px;border-bottom:1px solid #1a1f2e;color:#94a3b8;vertical-align:middle}
.sheet-table tr:last-child td{border-bottom:none}
.sheet-table tr:hover td{background:rgba(255,255,255,.02)}
.month-header{background:#0e1117;border:1px solid #1e2330;border-radius:10px;margin-bottom:10px;overflow:hidden}
.month-header-title{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.month-header-title:hover{background:rgba(255,255,255,.02)}
.badge-ok{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2);border-radius:20px;padding:2px 8px;font-size:10px}
.badge-partial{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.2);border-radius:20px;padding:2px 8px;font-size:10px}
.badge-none{background:rgba(100,116,139,.08);color:#475569;border:1px solid #1e2330;border-radius:20px;padding:2px 8px;font-size:10px}
.wave3-done-banner{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.2);border-radius:10px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
</style></head><body>
<div id="app"></div>
<div id="modal-root"></div>
<script>
const VERSIONS=[
  {num:"3.4.1",date:"2026-05-03",changes:[
    "✦ 修復 Samsung 瀏覽器黑畫面相容性問題",
    "✦ 優化 CSS 捲動結構",
    "✦ 保持 4 號/18 號/25 號新波段順序"
  ]},
  {num:"3.4.0",date:"2026-05-03",changes:[
    "✦ 重構波段順序：改以 4 號（原第三波）為第一波",
    "✦ 更新自動歸檔觸發邏輯"
  ]}
];
const VERSION=VERSIONS[0];

const BANKS=[
  {id:9,name:"中國信託",day:20,type:"auto",wave:1},
  {id:10,name:"兆豐銀行",day:21,type:"manual",wave:1},
  {id:11,name:"彰化銀行",day:31,type:"manual",wave:1},
  {id:1,name:"遠東商銀",day:2,type:"manual",wave:2},
  {id:2,name:"國泰世華",day:3,type:"auto",wave:2},
  {id:3,name:"華南銀行",day:7,type:"auto",wave:2},
  {id:4,name:"玉山銀行",day:7,type:"auto",wave:2},
  {id:5,name:"聯邦銀行",day:9,type:"manual",wave:3},
  {id:6,name:"元大銀行",day:10,type:"manual",wave:3},
  {id:7,name:"台新銀行",day:12,type:"auto",wave:3},
  {id:8,name:"新光銀行",day:14,type:"auto",wave:3},
  {id:12,name:"台北富邦",day:null,type:"manual",wave:null}
];

const WAVES=[
  {id:1,label:"第一波",checkDay:4,banks:[9,10,11],color:"#34d399",next:false},
  {id:2,label:"第二波",checkDay:18,banks:[1,2,3,4],color:"#60a5fa",next:false},
  {id:3,label:"第三波",checkDay:25,banks:[5,6,7,8],color:"#a78bfa",next:false}
];

// 功能與渲染邏輯保持與 3.4.0 一致，但移除導致黑畫面的 overflow:hidden 限制
function getDue(d){
  if(!d)return null;
  const t=new Date();
  const prevMonth=new Date(t.getFullYear(),t.getMonth()-1,1);
  const billingDate=new Date(prevMonth.getFullYear(),prevMonth.getMonth(),
    Math.min(d,new Date(prevMonth.getFullYear(),prevMonth.getMonth()+1,0).getDate()));
  const due=new Date(billingDate);due.setDate(due.getDate()+18);return due;
}
function getWD(w){
  const t=new Date();t.setHours(0,0,0,0);
  return new Date(t.getFullYear(),t.getMonth(),w.checkDay);
}
function daysTo(d){const t=new Date();t.setHours(0,0,0,0);return Math.ceil((d-t)/86400000);}
function fmt(d){return d?d.getMonth()+1+"/"+d.getDate():"—";}
function fmtTime(ts){
  if(!ts)return"";
  const d=new Date(ts);
  return(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
function fmtMonthLabel(key){
  const [y,m]=key.split("-");
  return y+"年"+m+"月";
}
function curWave(){const d=new Date().getDate();return d<=4?1:d<=18?2:3;}
function monthKey(){const t=new Date();return t.getFullYear()+"-"+(t.getMonth()+1);}

let fw="all";
let remOn=localStorage.getItem("rem")==="1";
let banner="",bTimer=null,isOffline=false;
let confirmed=JSON.parse(localStorage.getItem("confirmed")||"{}");
let dismissedNotifs=JSON.parse(localStorage.getItem("dismissedNotifs")||"{}");
let history=JSON.parse(localStorage.getItem("payHistory")||"{}");
let currentTab="dashboard";
let sheetExpandedMonths={};

const today=new Date();
const cw=curWave();

window.addEventListener('offline', () => { isOffline=true; showBanner("⚠️ 目前處於離線模式"); });
window.addEventListener('online', () => { isOffline=false; showBanner("✅ 網路已恢復連線"); });
if(!navigator.onLine) { isOffline=true; }

function showBanner(msg){
  banner=msg;render();
  if(bTimer)clearTimeout(bTimer);
  if(!isOffline || msg.includes("恢復")) {
    bTimer=setTimeout(()=>{banner=isOffline?"⚠️ 目前處於離線模式":"";render();},3000);
  }
}

function getConfirmed(id){
  const k=monthKey();
  return confirmed[k]&&confirmed[k][id]?confirmed[k][id]:null;
}
function isDone(id){return !!getConfirmed(id);}

function getWave3BankIds(){return WAVES.find(w=>w.id===3).banks;}
function checkWave3Complete(){
  const w3ids=getWave3BankIds().filter(id=>BANKS.find(b=>b.id===id));
  return w3ids.every(id=>isDone(id));
}
function archiveAndReset(){
  const k=monthKey();
  const cur=confirmed[k]||{};
  if(!history[k])history[k]={};
  Object.keys(cur).forEach(id=>{
    const bank=BANKS.find(b=>b.id===Number(id));
    if(!bank)return;
    history[k][id]={ts:cur[id].ts,bankName:bank.name,wave:bank.wave,type:bank.type,day:bank.day};
  });
  localStorage.setItem("payHistory",JSON.stringify(history));
  const w3ids=new Set(getWave3BankIds());
  const newMonthData={};
  Object.keys(cur).forEach(id=>{
    if(w3ids.has(Number(id)))newMonthData[id]=cur[id];
  });
  confirmed[k]=newMonthData;
  localStorage.setItem("confirmed",JSON.stringify(confirmed));
  showBanner("🎉 本月對帳全部完成！歷史已存檔。");
}

let wave3WasComplete=checkWave3Complete();
function checkAndTriggerWave3(){
  const nowComplete=checkWave3Complete();
  if(!wave3WasComplete&&nowComplete){wave3WasComplete=true;archiveAndReset();}
  else{wave3WasComplete=nowComplete;}
}

function showVersionHistory(){
  const mr=document.getElementById("modal-root");
  mr.innerHTML=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()" style="max-height:80vh;overflow-y:auto;text-align:left">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:16px;font-weight:700;color:#f1f5f9">📋 更新履歷</div>
      <button onclick="closeModal()" style="background:none;border:1px solid #334155;color:#64748b;border-radius:8px;padding:4px 10px;cursor:pointer;font-family:inherit;font-size:12px">關閉</button>
    </div>
    ${VERSIONS.map((v,i)=>`<div style="margin-bottom:16px;padding-bottom:16px;border-bottom:${i<VERSIONS.length-1?"1px solid #1e2330":"none"}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <span style="background:rgba(99,102,241,.15);color:#818cf8;border:1px solid rgba(99,102,241,.3);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700">v${v.num}</span>
        ${i===0?"<span style='background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2);border-radius:20px;padding:2px 8px;font-size:10px'>最新</span>":""}
        <span style="font-size:11px;color:#475569">${v.date}</span>
      </div>
      ${v.changes.map(c=>`<div style="font-size:12px;color:#64748b;line-height:1.8;padding-left:4px">${c}</div>`).join("")}
    </div>`).join("")}
  </div></div>`;
}

function confirmPay(id){
  const bank=BANKS.find(b=>b.id===id);
  const mr=document.getElementById("modal-root");
  mr.innerHTML=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
    <div style="font-size:22px;margin-bottom:12px">💳</div>
    <div style="font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:6px">${bank.name}</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:20px">確定已完成繳款了嗎？</div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button onclick="closeModal()" style="flex:1;padding:10px;border:1px solid #334155;background:none;color:#94a3b8;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px">取消</button>
      <button onclick="doConfirm(${id})" style="flex:1;padding:10px;border:none;background:rgba(52,211,153,.15);color:#34d399;border-radius:10px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600">確認</button>
    </div>
  </div></div>`;
}

function doConfirm(id){
  const k=monthKey();
  if(!confirmed[k])confirmed[k]={};
  confirmed[k][id]={ts:Date.now()};
  localStorage.setItem("confirmed",JSON.stringify(confirmed));
  closeModal();
  checkAndTriggerWave3();
  if(!banner)showBanner("✓ 已標記確認！");
  render();
}
function doCancel(id){
  const k=monthKey();
  if(confirmed[k])delete confirmed[k][id];
  localStorage.setItem("confirmed",JSON.stringify(confirmed));
  wave3WasComplete=false;
  closeModal();
  showBanner("已取消確認");
  render();
}
function closeModal(){document.getElementById("modal-root").innerHTML="";}
function resetAll(){
  if(!confirm("確定要重置本月所有確認記錄嗎？"))return;
  const k=monthKey();
  delete confirmed[k];
  localStorage.setItem("confirmed",JSON.stringify(confirmed));
  wave3WasComplete=false;
  render();
}

function isDismissed(id){
  const k=monthKey();
  return !!(dismissedNotifs[k]&&dismissedNotifs[k][id]);
}
function dismissAlert(id){
  const k=monthKey();
  if(!dismissedNotifs[k])dismissedNotifs[k]={};
  dismissedNotifs[k][id]=true;
  localStorage.setItem("dismissedNotifs",JSON.stringify(dismissedNotifs));
  render();
}
function dismissAllAlerts(){
  const alerts=getPageAlerts();
  const k=monthKey();
  if(!dismissedNotifs[k])dismissedNotifs[k]={};
  alerts.forEach(a=>{dismissedNotifs[k][a.id]=true;});
  localStorage.setItem("dismissedNotifs",JSON.stringify(dismissedNotifs));
  render();
}
function getPageAlerts(){
  const alerts=[];
  WAVES.forEach(w=>{
    const cd=getWD(w);
    const days=daysTo(cd);
    const manualBanks=w.banks.map(id=>BANKS.find(b=>b.id===id)).filter(b=>b&&b.type==="manual");
    const unconfirmed=manualBanks.filter(b=>!isDone(b.id));
    if(days===0)alerts.push({id:"wave-check-"+w.id,level:"today",icon:"📋",title:w.label+"檢查日！",body:"今天（"+fmt(cd)+"）請對帳"});
    else if(days===1)alerts.push({id:"wave-soon-"+w.id,level:"urgent",icon:"⚡",title:w.label+"明天對帳",body:"明天（"+fmt(cd)+"）對帳日"});
    unconfirmed.forEach(b=>{
      const due=getDue(b.day);
      if(!due)return;
      const dd=daysTo(due);
      if(dd<=3&&dd>=0){
        const level=dd===0?"urgent":dd===1?"today":"soon";
        alerts.push({id:"bank-"+b.id,level,icon:dd===0?"🚨":"⚠️",
          title:b.name+(dd===0?" 今日截止！":" 明日截止！"),
          body:"截止日："+fmt(due)});
      }
    });
  });
  return alerts.filter(a=>!isDismissed(a.id));
}

function setTab(t){currentTab=t;render();}
function setFw(v){fw=v;render();}
function toggleSheetMonth(key){sheetExpandedMonths[key]=!sheetExpandedMonths[key];render();}

function renderSheetPage(){
  const k=monthKey();
  const curData=confirmed[k]||{};
  const allMonths={};
  Object.keys(history).forEach(mk=>{if(!allMonths[mk])allMonths[mk]={}; Object.assign(allMonths[mk],history[mk]);});
  Object.keys(curData).forEach(id=>{
    if(!allMonths[k])allMonths[k]={};
    if(!allMonths[k][id]){
      const bank=BANKS.find(b=>b.id===Number(id));
      if(!bank)return;
      allMonths[k][id]={ts:curData[id].ts,bankName:bank.name,wave:bank.wave,type:bank.type,day:bank.day};
    }
  });
  const sortedMonths=Object.keys(allMonths).sort((a,b)=>{
    const [ay,am]=a.split("-").map(Number);
    const [by,bm]=b.split("-").map(Number);
    return by!==ay?by-ay:bm-am;
  });
  if(sortedMonths.length===0){
    return`<div style="text-align:center;padding:40px 20px;color:#334155">尚無繳款記錄</div>`;
  }
  const waveColor={1:"#34d399",2:"#60a5fa",3:"#a78bfa",null:"#64748b"};
  const waveLabel={1:"第一波",2:"第二波",3:"第三波",null:"—"};
  return sortedMonths.map(mk=>{
    const entries=Object.values(allMonths[mk]);
    const isExpanded=sheetExpandedMonths[mk]!==false;
    const rows=entries.map(e=>`<tr><td>${e.bankName}</td><td style="color:${waveColor[e.wave]}">${waveLabel[e.wave]}</td><td>${e.type==="manual"?"手動":"自動"}</td><td>${fmtTime(e.ts)}</td></tr>`).join("");
    return`<div class="month-header"><div class="month-header-title" onclick="toggleSheetMonth('${mk}')">${fmtMonthLabel(mk)} (${entries.length} 筆) <span>${isExpanded?"▾":"▸"}</span></div>${isExpanded?`<table class="sheet-table"><thead><tr><th>銀行</th><th>波段</th><th>類型</th><th>時間</th></tr></thead><tbody>${rows}</tbody></table>`:""}</div>`;
  }).join("");
}

function render(){
  const ds=today.getFullYear()+"/"+(today.getMonth()+1)+"/"+today.getDate();
  const bannerHtml = banner ? `<div class="banner ${isOffline ? 'offline-banner' : ''}">${banner}</div>` : "";
  const headerHtml=`<div style="border-bottom:1px solid #1e2330;padding:14px 16px;display:flex;justify-content:space-between"><div><span style="font-size:18px;font-weight:700;color:#f1f5f9">信用卡繳款管理</span> <span class="version-badge" onclick="showVersionHistory()">v${VERSION.num}</span></div><div style="text-align:right;font-size:12px;color:#94a3b8">${ds}</div></div>`;
  const tabNavHtml=`<div class="tab-nav"><button class="tab-btn ${currentTab==="dashboard"?"active":""}" onclick="setTab('dashboard')">📊 總覽</button><button class="tab-btn ${currentTab==="sheet"?"active":""}" onclick="setTab('sheet')">📋 歷史</button></div>`;

  if(currentTab==="sheet"){
    document.getElementById("app").innerHTML=bannerHtml+headerHtml+`<div class="page-content" style="padding:16px 12px">${renderSheetPage()}</div>`+tabNavHtml;
    return;
  }

  const nextW=WAVES.map(w=>({...w,dl:daysTo(getWD(w))})).filter(w=>w.dl>=0).sort((a,b)=>a.dl-b.dl)[0];
  const banks=fw==="all"?BANKS:BANKS.filter(b=>String(b.wave)===fw);
  const doneCount=BANKS.filter(b=>isDone(b.id)).length;
  const alerts=getPageAlerts();
  const w3done=checkWave3Complete();

  document.getElementById("app").innerHTML=
    bannerHtml+headerHtml+
    `<div class="page-content" style="padding:16px 12px">
      ${w3done?`<div class="wave3-done-banner">🎉 本月對帳全部完成！</div>`:""}
      ${alerts.length?`<div class="notif-panel"><div class="notif-panel-header">提醒 (${alerts.length}) <button onclick="dismissAllAlerts()" style="background:none;border:none;color:#64748b;font-size:10px">全部忽略</button></div>${alerts.map(a=>`<div class="notif-item">${a.icon} <b>${a.title}</b><br>${a.body}</div>`).join("")}</div>`:""}
      <div class="stat-grid">
        <div class="stat-card"><div style="font-size:9px;color:#475569">已確認</div><div style="font-size:26px;font-weight:700;color:#34d399">${doneCount}/${BANKS.length}</div></div>
        ${nextW?`<div class="stat-card"><div style="font-size:9px;color:#475569">下次對帳</div><div style="font-size:26px;font-weight:700;color:${nextW.color}">${nextW.dl}天後</div></div>`:""}
      </div>
      <div class="card" style="padding:12px">
        <div style="display:flex;justify-content:space-between">
          ${WAVES.map(w=>`<div style="text-align:center;flex:1"><div style="width:30px;height:30px;border-radius:50%;background:${w.id<=cw?w.color:"#1a2035"};margin:0 auto;line-height:30px;font-weight:700;color:#0a0c10">${w.id}</div><div style="font-size:11px;margin-top:4px">${w.label}</div><div style="font-size:9px;color:#475569">${w.checkDay}號</div></div>`).join("")}
        </div>
      </div>
      <div class="card">
        <div style="padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:11px;color:#475569">銀行清單</span>
          <div style="display:flex;gap:4px">
            ${["all","1","2","3"].map(w=>`<button class="wave-btn ${fw===w?"active":""}" onclick="setFw('${w}')">${w==="all"?"全":w}</button>`).join("")}
          </div>
        </div>
        ${banks.map(bank=>{
          const wave=WAVES.find(w=>w.id===bank.wave);
          const due=getDue(bank.day);
          const done=isDone(bank.id);
          return`<div class="row" style="opacity:${done?0.5:1}">
            <div style="flex:1">
              <div style="font-size:14px;font-weight:500">${bank.name}</div>
              <div style="font-size:11px;color:#475569">${bank.day?"結帳 "+bank.day+" 號 → 截止 "+fmt(due):"結帳日未知"}</div>
            </div>
            <div style="text-align:right">
              ${wave?`<span class="chip" style="color:${wave.color};border:1px solid ${wave.color}">${wave.label}</span>`:""}
              <button class="cbtn ${done?"done":""}" onclick="confirmPay(${bank.id})">${done?"✓":"確認"}</button>
            </div>
          </div>`;
        }).join("")}
      </div>
    </div>`+tabNavHtml;
}

window.setFw=setFw; window.setTab=setTab; window.confirmPay=confirmPay; window.doConfirm=doConfirm; window.doCancel=doCancel; window.closeModal=closeModal; window.resetAll=resetAll; window.dismissAlert=dismissAlert; window.dismissAllAlerts=dismissAllAlerts; window.showVersionHistory=showVersionHistory; window.toggleSheetMonth=toggleSheetMonth;
render();
</script>
</body></html>
