<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0c10"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>信用卡繳款管理</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0c10;color:#e2e8f0;font-family:'Noto Sans TC',sans-serif;min-height:100vh}
  
  /* 離線狀態欄樣式 */
  #online-status {
    text-align: center;
    font-size: 11px;
    padding: 4px;
    background: #111318;
    transition: all 0.3s;
    border-bottom: 1px solid #1e2330;
  }
  #online-status.offline {
    color: #ffa500; /* 離線時顯示橘色 */
    background: #2d1215;
    border-bottom-color: #ffa500;
  }
  
  .card{background:#111318;border:1px solid #1e2330;border-radius:12px;margin-bottom:14px}
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
  .stat-card{background:#0e1117;border:1px solid #1e2330;border-radius:10px;padding:14px}
  .wave-btn{border:1px solid #1e2330;background:#111318;color:#64748b;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:inherit}
  .wave-btn.active{background:#1e293b;border-color:#3b82f6;color:#60a5fa}
  .row{border-bottom:1px solid #1a1f2e;padding:11px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .row:last-child{border-bottom:none}
  .avatar{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
  .chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}
  .manual{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
  .auto{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2)}
  .w1{background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.2);border-radius:6px}
  .w2{background:rgba(167,139,250,.1);color:#a78bfa;border:1px solid rgba(167,139,250,.2);border-radius:6px}
  .w3{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.2);border-radius:6px}
  .pulse{animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .banner{position:fixed;top:40px;left:50%;transform:translateX(-50%);background:#052e16;border:1px solid rgba(52,211,153,.3);color:#34d399;padding:9px 16px;border-radius:10px;font-size:12px;z-index:999}
  .cbtn{border:1px solid #334155;background:none;color:#64748b;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:11px;font-family:inherit;margin-top:4px}
  .cbtn.done{background:rgba(52,211,153,.1);color:#34d399;border-color:rgba(52,211,153,.3)}
  .cbtn.cancel{background:rgba(239,68,68,.08);color:#f87171;border-color:rgba(239,68,68,.2)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
  .modal{background:#111318;border:1px solid #1e2330;border-radius:16px;padding:24px;width:100%;max-width:320px;text-align:center}
  .tab-nav{display:flex;gap:4px;padding:10px 16px;border-top:1px solid #1e2330;background:#0a0c10;position:fixed;bottom:0;left:0;right:0;z-index:100;justify-content:center}
  .tab-btn{padding:9px 32px;border-radius:10px;border:1px solid #1e2330;background:none;color:#64748b;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer}
  .tab-btn.active{background:#1e293b;border-color:#3b82f6;color:#60a5fa}
  .page-content{padding: 10px 12px 80px}
</style>
</head>
<body>
<div id="online-status">
  <span id="status-icon">🌐</span> <span id="status-text">連線中</span>
</div>

<div id="app"></div>
<div id="modal-root"></div>

<script>
// --- PWA 註冊與狀態偵測 ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed', err));
  });
}

function updateConnectionStatus() {
  const statusEl = document.getElementById('online-status');
  const statusText = document.getElementById('status-text');
  const statusIcon = document.getElementById('status-icon');
  
  if (navigator.onLine) {
    statusEl.classList.remove('offline');
    statusText.textContent = '連線中';
    statusIcon.textContent = '🌐';
  } else {
    statusEl.classList.add('offline');
    statusText.textContent = '⚠️ 網路離線 (離線使用中)';
    statusIcon.textContent = '📵';
  }
}
window.addEventListener('online', updateConnectionStatus);
window.addEventListener('offline', updateConnectionStatus);
updateConnectionStatus();

/* 原有代碼邏輯開始 (保持不變，整合至 render 中) */
const BANKS=[
  {id:1,name:"遠東商銀",day:2,type:"manual",wave:1},
  {id:2,name:"國泰世華",day:3,type:"auto",wave:1},
  {id:3,name:"華南銀行",day:7,type:"auto",wave:1},
  {id:4,name:"玉山銀行",day:7,type:"auto",wave:1},
  {id:5,name:"聯邦銀行",day:9,type:"manual",wave:2},
  {id:6,name:"元大銀行",day:10,type:"manual",wave:2},
  {id:7,name:"台新銀行",day:12,type:"auto",wave:2},
  {id:8,name:"新光銀行",day:14,type:"auto",wave:2},
  {id:9,name:"中國信託",day:20,type:"auto",wave:3},
  {id:10,name:"兆豐銀行",day:21,type:"manual",wave:3},
  {id:11,name:"彰化銀行",day:31,type:"manual",wave:3},
  {id:12,name:"台北富邦",day:null,type:"manual",wave:null}
];
const WAVES=[
  {id:1,label:"第一波",checkDay:18,banks:[1,2,3,4],color:"#60a5fa"},
  {id:2,label:"第二波",checkDay:25,banks:[5,6,7,8],color:"#a78bfa"},
  {id:3,label:"第三波",checkDay:4,banks:[9,10,11],color:"#34d399"}
];

let currentTab = 'dashboard';
let confirmed = JSON.parse(localStorage.getItem("confirmed") || "{}");

function render() {
  const k = (new Date().getFullYear()) + "-" + (new Date().getMonth() + 1);
  const doneCount = BANKS.filter(b => confirmed[k] && confirmed[k][b.id]).length;

  let html = `
    <div style="padding:14px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #1e2330">
      <div>
        <div style="font-size:18px; font-weight:700">信用卡繳款管理</div>
        <div style="font-size:10px; color:#475569">V3.1.0 · 離線可用版</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:12px; color:#94a3b8">${new Date().toLocaleDateString()}</div>
      </div>
    </div>

    <div class="page-content">
      <div class="stat-grid">
        <div class="stat-card">
          <div style="font-size:9px; color:#475569">已確認</div>
          <div style="font-size:26px; font-weight:700; color:#34d399">${doneCount}</div>
        </div>
        <div class="stat-card">
          <div style="font-size:9px; color:#475569">本月進度</div>
          <div style="font-size:26px; font-weight:700; color:#60a5fa">${Math.round((doneCount/BANKS.length)*100)}%</div>
        </div>
      </div>

      <div class="card">
        <div style="padding:12px 14px; border-bottom:1px solid #1a1f2e; color:#475569; font-size:11px">各波段銀行清單</div>
        ${BANKS.map(bank => {
          const isBankDone = confirmed[k] && confirmed[k][bank.id];
          return `
            <div class="row" style="opacity:${isBankDone ? '0.5' : '1'}">
              <div class="avatar" style="background:#1e2330">${bank.name[0]}</div>
              <div style="flex:1">
                <div style="font-size:14px; font-weight:500; ${isBankDone ? 'text-decoration:line-through' : ''}">${bank.name}</div>
                <div style="font-size:10px; color:#475569">${bank.type==='manual'?'⚠ 手動':'✓ 自動'}</div>
              </div>
              <button class="cbtn ${isBankDone?'done':''}" onclick="togglePay(${bank.id})">
                ${isBankDone ? '✓ 已確認' : '確認繳款'}
              </button>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <div class="tab-nav">
      <button class="tab-btn active">📊 總覽</button>
      <button class="tab-btn" onclick="alert('記錄頁面載入中...')">📋 記錄</button>
    </div>
  `;
  document.getElementById("app").innerHTML = html;
}

function togglePay(id) {
  const k = (new Date().getFullYear()) + "-" + (new Date().getMonth() + 1);
  if(!confirmed[k]) confirmed[k] = {};
  if(confirmed[k][id]) delete confirmed[k][id];
  else confirmed[k][id] = { ts: Date.now() };
  localStorage.setItem("confirmed", JSON.stringify(confirmed));
  render();
}

render();
</script>
</body>
</html>
