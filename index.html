<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>信用卡繳款管理</title>

<style>
body{
  margin:0;
  background:#0a0c10;
  color:#e2e8f0;
  font-family:sans-serif;
}

.row{
  padding:14px;
  border-bottom:1px solid #1a1f2e;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.page-content{
  padding-bottom:calc(140px + env(safe-area-inset-bottom));
}

.tab{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#0a0c10;
  border-top:1px solid #1e2330;
  padding:12px;
  text-align:center;
}

.btn{
  padding:6px 10px;
  border-radius:6px;
  border:1px solid #334155;
  cursor:pointer;
}

.done{
  color:#34d399;
}
</style>
</head>

<body>

<div id="app"></div>

<div class="tab">底部功能列（已修正不遮擋）</div>

<script>
// ===== 版本履歷 =====
const VERSIONS = [
  {
    num:"4.0.0",
    date:"2026-05-04",
    changes:[
      "🔥 改為帳單月份制（完全解決跨月錯亂）",
      "🔥 修正4月資料跑到5月問題",
      "🔥 修正底部遮擋問題（支援 safe-area）",
      "✨ 重構資料結構",
    ]
  },
  {
    num:"3.7.0",
    date:"2026-05-04",
    changes:["舊版自動重置（已淘汰）"]
  }
]

// ===== 銀行 =====
const BANKS=[
  {id:1,name:"遠東",day:2},
  {id:2,name:"國泰",day:3},
  {id:3,name:"華南",day:7},
  {id:4,name:"富邦",day:null}
]

// ===== 取得帳單月份（核心）=====
function getBillKey(bank){
  const now=new Date()
  let year=now.getFullYear()
  let month=now.getMonth()+1

  // 第一波：抓上個月帳單
  if(bank.day>=20){
    month--
    if(month===0){
      month=12
      year--
    }
  }

  return `${year}-${month}`
}

// ===== 儲存 =====
function getData(){
  return JSON.parse(localStorage.getItem("billData")||"{}")
}

function saveData(data){
  localStorage.setItem("billData",JSON.stringify(data))
}

// ===== 是否完成 =====
function isDone(bank){
  const data=getData()
  const key=getBillKey(bank)
  return data[key] && data[key][bank.id]
}

// ===== 設為完成 =====
function toggle(bank){
  const data=getData()
  const key=getBillKey(bank)

  if(!data[key]) data[key]={}

  if(data[key][bank.id]){
    delete data[key][bank.id]
  }else{
    data[key][bank.id]={ts:Date.now()}
  }

  saveData(data)
  render()
}

// ===== 渲染 =====
function render(){
  const app=document.getElementById("app")

  app.innerHTML=`
    <div class="page-content">
      <h2 style="padding:14px">信用卡管理 v4.0.0</h2>

      ${BANKS.map(b=>{
        const done=isDone(b)
        return `
          <div class="row">
            <div>
              <div>${b.name}</div>
              <div style="font-size:12px;color:#64748b">
                帳單key: ${getBillKey(b)}
              </div>
            </div>

            <button class="btn ${done?'done':''}"
              onclick="toggle(${b.id})">
              ${done?"✓ 已繳":"確認"}
            </button>
          </div>
        `
      }).join("")}
    </div>
  `
}

// ===== 修正 onclick id 傳遞 =====
window.toggle = (id)=>{
  const bank=BANKS.find(b=>b.id===id)
  toggle(bank)
}

// ===== 初始化 =====
render()
</script>

</body>
</html>
